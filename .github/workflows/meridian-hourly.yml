name: MeridianLink hourly export

on:
  schedule:
    - cron: "17 * * * *"
  workflow_dispatch:
    inputs:
      force:
        description: "Bypass the business-hours check and run now"
        type: boolean
        default: false

jobs:
  export:
    runs-on: ubuntu-latest
    env:
      TZ: America/Phoenix
      MERIDIAN_PASSWORD: ${{ secrets.MERIDIAN_PASSWORD }}
      SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - run: python meridian_report_bot.py ${{ (github.event_name == 'workflow_dispatch' && inputs.force) && '--force' || '' }}
